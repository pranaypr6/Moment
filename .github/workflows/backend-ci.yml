name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore backend/Moment.slnx
      
    - name: Build
      run: dotnet build backend/Moment.slnx --no-restore
      
    - name: Test
      run: dotnet test backend/Moment.slnx --no-build --verbosity normal
